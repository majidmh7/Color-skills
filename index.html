<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hue Mastery: Color Skills</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e24">
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #ffffff;
            --accent-color: #4a90e2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        h1 { font-size: 1.6rem; }

        .settings-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 1.2rem;
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .settings-btn:active { transform: scale(0.9); }

        /* Modal Settings Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-align: center;
        }

        .setting-section {
            margin-bottom: 20px;
        }

        .setting-section label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .selector-row {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #888;
            padding: 10px 12px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--accent-color);
            color: white;
        }

        .close-modal-btn {
            width: 100%;
            background: #e74c3c;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Game Main Screen UI */
        .game-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .top-status {
            font-size: 0.95rem;
            color: #aaa;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .color-displays {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .color-box {
            flex: 1;
            height: 150px;
            border-radius: 15px;
            border: 3px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: background-color 0.3s ease;
        }

        .feedback {
            height: 24px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Classic Mode UI Layout */
        .controls-classic {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .color-add-btn {
            border: none;
            border-radius: 12px;
            padding: 15px 5px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        /* Alchemy Mode UI Layout */
        .controls-alchemy {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .alchemy-option {
            width: calc(33.33% - 7px);
            height: 75px;
            border-radius: 12px;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .alchemy-option.selected {
            border-color: #ffffff;
            transform: scale(0.95);
            box-shadow: 0 0 12px var(--accent-color);
        }

        .next-btn {
            width: 100%;
            background: #2ecc71;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            display: none;
        }

        /* Footer Stats System */
        .footer-stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.2);
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-val {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }

        .stat-val.streak-active {
            color: #f1c40f;
            text-shadow: 0 0 8px rgba(241, 196, 15, 0.4);
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Hue Mastery</h1>
        <button class="settings-btn" onclick="toggleSettings(true)">⚙️</button>
    </header>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <h2>Game Settings</h2>
            
            <div class="setting-section">
                <label>Color Physics</label>
                <div class="selector-row">
                    <button id="mode-paint" class="toggle-btn active" onclick="setPhysics('paint')">Paint (RYB)</button>
                    <button id="mode-light" class="toggle-btn" onclick="setPhysics('light')">Light (RGB)</button>
                </div>
            </div>

            <div class="setting-section">
                <label>Game Mode</label>
                <div class="selector-row">
                    <button id="type-alchemy" class="toggle-btn active" onclick="setGameType('alchemy')">Alchemy Pairs</button>
                    <button id="type-classic" class="toggle-btn" onclick="setGameType('classic')">Build Up</button>
                </div>
            </div>

            <button class="close-modal-btn" onclick="toggleSettings(false)">Close Menu</button>
        </div>
    </div>

    <div class="game-container">
        <div class="top-status" id="game-status-label">Find the 2 Ingredients!</div>

        <div class="color-displays">
            <div class="color-box" id="current-box" style="display: none;">Your Canvas</div>
            <div class="color-box" id="target-box">Target Color</div>
        </div>

        <div class="feedback" id="feedback-text"></div>

        <div class="controls-classic" id="panel-classic" style="display: none;">
            <button class="color-add-btn" id="btn-0" onclick="makeClassicMove(0)"></button>
            <button class="color-add-btn" id="btn-1" onclick="makeClassicMove(1)"></button>
            <button class="color-add-btn" id="btn-2" onclick="makeClassicMove(2)"></button>
        </div>

        <div class="controls-alchemy" id="panel-alchemy">
            <div class="alchemy-option" id="alc-0" onclick="selectAlchemy(0)"></div>
            <div class="alchemy-option" id="alc-1" onclick="selectAlchemy(1)"></div>
            <div class="alchemy-option" id="alc-2" onclick="selectAlchemy(2)"></div>
            <div class="alchemy-option" id="alc-3" onclick="selectAlchemy(3)"></div>
            <div class="alchemy-option" id="alc-4" onclick="selectAlchemy(4)"></div>
        </div>

        <button class="next-btn" id="next-round-btn" onclick="startRound()">Next Round</button>

        <div class="footer-stats">
            <div class="stat-block">
                <div class="stat-val" id="score-counter">0</div>
                <div class="stat-lbl">Score</div>
            </div>
            <div class="stat-block">
                <div class="stat-val" id="streak-counter">0</div>
                <div class="stat-lbl">Streak</div>
            </div>
        </div>
    </div>

    <script>
        const paintCube = {
            "000": [255, 255, 255], "100": [235, 35, 35],   "010": [255, 220, 0],   "001": [25, 85, 230],
            "110": [245, 135, 0],   "101": [135, 45, 165],  "011": [40, 165, 75],   "111": [45, 42, 40]
        };
        const lightCube = {
            "000": [0, 0, 0],       "100": [255, 0, 0],     "010": [0, 255, 0],     "001": [0, 0, 255],
            "110": [255, 255, 0],   "101": [255, 0, 255],   "011": [0, 255, 255],   "111": [255, 255, 255]
        };
        const modeConfigs = {
            paint: { cube: paintCube, labels: ["+ Red", "+ Yellow", "+ Blue"], colors: ["#eb2323", "#ffd400", "#1955e6"] },
            light: { cube: lightCube, labels: ["+ Red", "+ Green", "+ Blue"], colors: ["#ff0000", "#00ff00", "#0000ff"] }
        };

        // Core App Variables - Alchemy now Defaults
        let currentPhysics = 'paint';
        let currentGameType = 'alchemy';
        let score = 0;
        let streak = 0;
        
        let currentStep = 1;
        const maxSteps = 4;
        let currentState = [0, 0, 0];
        let targetState = [0, 0, 0];
        
        let alchemyPool = [];    
        let alchemyCorrect = []; 
        let alchemySelected = [];
        let targetRGB = [0, 0, 0];

        function toggleSettings(show) {
            document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
        }

        function stateToRGB(state, cube) {
            const [x, y, z] = state;
            const weights = [
                (1-x)*(1-y)*(1-z), x*(1-y)*(1-z), (1-x)*y*(1-z), (1-x)*(1-y)*z,
                x*y*(1-z),         x*(1-y)*z,     (1-x)*y*z,     x*y*z
            ];
            const keys = ["000", "100", "010", "001", "110", "101", "011", "111"];
            let r=0, g=0, b=0;
            for(let i=0; i<8; i++) {
                r += weights[i] * cube[keys[i]][0];
                g += weights[i] * cube[keys[i]][1];
                b += weights[i] * cube[keys[i]][2];
            }
            return [Math.round(r), Math.round(g), Math.round(b)];
        }

        function rgbDistance(c1, c2) {
            return Math.sqrt((c1[0]-c2[0])**2 + (c1[1]-c2[1])**2 + (c1[2]-c2[2])**2);
        }

        function setPhysics(mode) {
            currentPhysics = mode;
            document.getElementById('mode-paint').classList.toggle('active', mode === 'paint');
            document.getElementById('mode-light').classList.toggle('active', mode === 'light');
            score = 0;
            streak = 0;
            startRound();
        }

        function setGameType(type) {
            currentGameType = type;
            document.getElementById('type-classic').classList.toggle('active', type === 'classic');
            document.getElementById('type-alchemy').classList.toggle('active', type === 'alchemy');
            
            document.getElementById('panel-classic').style.display = type === 'classic' ? 'grid' : 'none';
            document.getElementById('panel-alchemy').style.display = type === 'alchemy' ? 'flex' : 'none';
            document.getElementById('current-box').style.display = type === 'classic' ? 'flex' : 'none';
            
            score = 0;
            streak = 0;
            startRound();
        }

        function startRound() {
            document.getElementById('next-round-btn').style.display = 'none';
            document.getElementById('feedback-text').innerText = '';
            const config = modeConfigs[currentPhysics];

            if (currentGameType === 'classic') {
                currentStep = 1;
                document.getElementById('panel-classic').style.opacity = '1';
                document.getElementById('panel-classic').style.pointerEvents = 'auto';
                
                targetState = [Math.random() * 0.7 + 0.3, Math.random() * 0.7 + 0.3, Math.random() * 0.7 + 0.3];
                currentState = [targetState[0] * 0.2, targetState[1] * 0.2, targetState[2] * 0.2];
                targetRGB = stateToRGB(targetState, config.cube);

                for(let i=0; i<3; i++) {
                    const btn = document.getElementById(`btn-${i}`);
                    btn.innerText = config.labels[i];
                    btn.style.backgroundColor = config.colors[i];
                    btn.style.color = currentPhysics === 'paint' && i === 1 ? '#000' : '#fff';
                }
                document.getElementById('game-status-label').innerText = `Step: 1 / ${maxSteps}`;
            } 
            else { 
                alchemySelected = [];
                alchemyPool = [];
                document.getElementById('game-status-label').innerText = "Find the 2 Ingredients!";
                
                for(let i=0; i<5; i++) {
                    alchemyPool.push([Math.random(), Math.random(), Math.random()]);
                }
                
                let idx1 = Math.floor(Math.random() * 5);
                let idx2 = Math.floor(Math.random() * 5);
                while(idx1 === idx2) { idx2 = Math.floor(Math.random() * 5); }
                alchemyCorrect = [idx1, idx2];

                const mixedState = [
                    (alchemyPool[idx1][0] + alchemyPool[idx2][0]) / 2,
                    (alchemyPool[idx1][1] + alchemyPool[idx2][1]) / 2,
                    (alchemyPool[idx1][2] + alchemyPool[idx2][2]) / 2
                ];
                targetRGB = stateToRGB(mixedState, config.cube);

                for(let i=0; i<5; i++) {
                    const optCard = document.getElementById(`alc-${i}`);
                    const cardRGB = stateToRGB(alchemyPool[i], config.cube);
                    optCard.style.backgroundColor = `rgb(${cardRGB.join(',')})`;
                    optCard.classList.remove('selected');
                    optCard.style.border = ""; 
                    optCard.style.pointerEvents = 'auto';
                }
            }

            updateUI();
        }

        function updateUI() {
            const config = modeConfigs[currentPhysics];
            document.getElementById('target-box').style.backgroundColor = `rgb(${targetRGB.join(',')})`;
            document.getElementById('score-counter').innerText = score;
            
            const streakElement = document.getElementById('streak-counter');
            streakElement.innerText = streak;
            streakElement.classList.toggle('streak-active', streak > 0);

            if (currentGameType === 'classic') {
                const currentRGB = stateToRGB(currentState, config.cube);
                document.getElementById('current-box').style.backgroundColor = `rgb(${currentRGB.join(',')})`;
            }
        }

        function makeClassicMove(chosenIdx) {
            const config = modeConfigs[currentPhysics];
            const increment = 0.2;
            let bestIdx = -1;
            let minDistance = Infinity;

            for(let i = 0; i < 3; i++) {
                let testState = [...currentState];
                testState[i] = Math.min(1.0, testState[i] + increment);
                let testRGB = stateToRGB(testState, config.cube);
                let dist = rgbDistance(testRGB, targetRGB);
                if(dist < minDistance) {
                    minDistance = dist;
                    bestIdx = i;
                }
            }

            currentState[chosenIdx] = Math.min(1.0, currentState[chosenIdx] + increment);
            const feedback = document.getElementById('feedback-text');
            
            if(chosenIdx === bestIdx) {
                feedback.innerText = "✨ Correct direction!";
                feedback.style.color = "#2ecc71";
            } else {
                feedback.innerText = "❌ Straying off formula.";
                feedback.style.color = "#e74c3c";
            }

            updateUI();

            if(currentStep >= maxSteps) {
                document.getElementById('panel-classic').style.pointerEvents = 'none';
                document.getElementById('panel-classic').style.opacity = '0.5';
                document.getElementById('next-round-btn').style.display = 'block';
                
                const finalRGB = stateToRGB(currentState, config.cube);
                const accuracy = Math.max(0, Math.round(100 - (rgbDistance(finalRGB, targetRGB) / 4.41)));
                
                if (accuracy >= 85) {
                    streak++;
                    score += (10 * streak);
                    feedback.innerText = `Great Match! Accuracy: ${accuracy}% (+${10 * streak} pts)`;
                    feedback.style.color = "#2ecc71";
                } else {
                    streak = 0;
                    feedback.innerText = `Match completed. Accuracy: ${accuracy}% (Streak Reset)`;
                    feedback.style.color = "#e74c3c";
                }
                updateUI();
            } else {
                currentStep++;
                document.getElementById('game-status-label').innerText = `Step: ${currentStep} / ${maxSteps}`;
            }
        }

        function selectAlchemy(idx) {
            const card = document.getElementById(`alc-${idx}`);
            
            if (alchemySelected.includes(idx)) {
                alchemySelected = alchemySelected.filter(i => i !== idx);
                card.classList.remove('selected');
                return;
            }

            if (alchemySelected.length < 2) {
                alchemySelected.push(idx);
                card.classList.add('selected');
            }

            if (alchemySelected.length === 2) {
                for(let i=0; i<5; i++) {
                    document.getElementById(`alc-${i}`).style.pointerEvents = 'none';
                }

                const feedback = document.getElementById('feedback-text');
                const isCorrect = alchemySelected.includes(alchemyCorrect[0]) && alchemySelected.includes(alchemyCorrect[1]);

                if (isCorrect) {
                    streak++;
                    const dynamicPoints = 25 * streak;
                    score += dynamicPoints;
                    feedback.innerText = `🎉 Correct! Combo x${streak} (+${dynamicPoints} pts)`;
                    feedback.style.color = "#2ecc71";
                } else {
                    streak = 0;
                    feedback.innerText = "🔮 Instability! Wrong ingredients.";
                    feedback.style.color = "#e74c3c";
                    document.getElementById(`alc-${alchemyCorrect[0]}`).style.border = "3px dashed #2ecc71";
                    document.getElementById(`alc-${alchemyCorrect[1]}`).style.border = "3px dashed #2ecc71";
                }

                updateUI();
                document.getElementById('next-round-btn').style.display = 'block';
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Fail:', err));
            });
        }

        startRound();
    </script>
</body>
</html>
